<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TextoVox — IA Voice</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:#0c0c10; --surface:#13131a; --surface2:#1a1a24; --border:#2a2a35;
      --accent:#d97706; --accent-dim:rgba(217,119,6,0.14); --accent-glow:rgba(217,119,6,0.35);
      --green:#22c55e; --green-dim:rgba(34,197,94,0.14);
      --text:#e8e6e0; --muted:#6b6878;
      --mono:'Space Mono',monospace; --serif:'Lora',Georgia,serif;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:var(--mono);min-height:100vh;padding:20px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;max-width:850px;margin:0 auto}
    .txt-area{width:100%;height:220px;background:transparent;border:1px solid var(--border);border-radius:10px;
      padding:16px;color:var(--text);font-family:var(--serif);font-size:16px;line-height:1.7;resize:none;outline:none}
    .txt-area:focus{border-color:var(--accent)}
    .btn{font-family:var(--mono);font-weight:700;font-size:12px;padding:12px 20px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:0.2s;border:none}
    .btn-a{background:var(--accent);color:#000}
    .btn-a:hover{box-shadow:0 0 15px var(--accent-glow)}
    .btn-g{background:var(--green);color:#000}
    .badge{font-size:10px;background:var(--accent-dim);color:var(--accent);padding:2px 6px;border-radius:4px;border:1px solid var(--accent-glow)}
    .sld{width:100%;height:4px;background:var(--border);border-radius:4px;appearance:none;outline:none}
    .sld::-webkit-slider-thumb{appearance:none;width:12px;height:12px;background:var(--accent);border-radius:50%;cursor:pointer}
    .toast{position:fixed;bottom:20px;right:20px;background:var(--surface2);border:1px solid var(--accent);padding:12px;border-radius:8px;font-size:12px;z-index:100}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div id="root"></div>

<script type="module">
  import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.7.1';
  env.allowLocalModels = false;
  env.useBrowserCache = true;

  let pipe = null;

  window.__tts = {
    loaded: false,
    async load(onProgress) {
      if (pipe) return;
      pipe = await pipeline('text-to-speech', 'Xenova/speecht5_tts', {
        dtype: 'fp32',
        device: 'auto',
        progress_callback: onProgress
      });
      this.loaded = true;
    },
    async synth(text) {
      const speaker_embeddings = 'https://huggingface.co/datasets/Xenova/transformers.js-docs/resolve/main/speaker_embeddings.bin';
      return await pipe(text, { speaker_embeddings });
    }
  };

  window.__encodeWAV = function(samples, sr) {
    const buf = new ArrayBuffer(44 + samples.length * 2);
    const v = new DataView(buf);
    const ws = (o,s) => { for(let i=0;i<s.length;i++) v.setUint8(o+i,s.charCodeAt(i)); };
    ws(0,'RIFF'); v.setUint32(4,36+samples.length*2,true);
    ws(8,'WAVE'); ws(12,'fmt ');
    v.setUint32(16,16,true); v.setUint16(20,1,true); v.setUint16(22,1,true);
    v.setUint32(24,sr,true); v.setUint32(28,sr*2,true);
    v.setUint16(32,2,true); v.setUint16(34,16,true);
    ws(36,'data'); v.setUint32(40,samples.length*2,true);
    for(let i=0;i<samples.length;i++){
      const s = Math.max(-1, Math.min(1, samples[i]));
      v.setInt16(44+i*2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
    }
    return buf;
  };
</script>

<script type="text/babel">
  const { useState, useRef } = React;

  const ISpin = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" style={{animation:'spin 1s linear infinite'}}><path d="M21 12a9 9 0 11-6-8.5"/></svg>;
  const IDown = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>;

  function App() {
    const [text, setText] = useState('Hola. Ahora el audio funciona y las estadísticas están activas.');
    const [status, setStatus] = useState('idle');
    const [prog, setProg] = useState({pct:0, label:''});
    const [blob, setBlob] = useState(null);
    const [volume, setVolume] = useState(1.0);
    const [toast, setToast] = useState('');
    const audioUrlRef = useRef(null);

    // Estadísticas
    const words = text.trim() ? text.trim().split(/\s+/).length : 0;
    const chars = text.length;
    const estS  = Math.round(words / 2.5);
    const est   = estS < 60 ? `~${estS}s` : `~${Math.round(estS/60)}min`;

    const showToast = (m) => { setToast(m); setTimeout(()=>setToast(''), 3000); };

    const handleGenerate = async () => {
      if (!text.trim()) return;
      setStatus('loading');
      try {
        const tts = window.__tts;
        if (!tts.loaded) {
          await tts.load(p => {
            if (p.status === 'progress') setProg({pct: Math.round(p.progress||0), label: `Cargando IA: ${Math.round(p.progress||0)}%`});
          });
        }
        setStatus('synth');
        const result = await tts.synth(text);
        
        let audioData = result.audio.data || result.audio;

        // Aplicar volumen
        if (volume !== 1.0) {
          audioData = audioData.map(v => v * volume);
        }

        const wav = window.__encodeWAV(audioData, result.sampling_rate);
        const newBlob = new Blob([wav], {type: 'audio/wav'});
        setBlob(newBlob);
        
        if (audioUrlRef.current) URL.revokeObjectURL(audioUrlRef.current);
        audioUrlRef.current = URL.createObjectURL(newBlob);
        
        setStatus('done');
        showToast('✓ Audio generado');
      } catch (e) {
        console.error(e);
        setStatus('idle');
        showToast('⚠ Error: ' + e.message);
      }
    };

    return (
      <div className="card">
        <h1 style={{fontSize:'22px', fontWeight:'700', marginBottom:'20px'}}>Texto<span style={{color:'var(--accent)'}}>Vox</span> IA</h1>
        
        <textarea className="txt-area" value={text} onChange={e=>{setText(e.target.value); setBlob(null);}} placeholder="Tu mensaje aquí..."/>

        <div style={{marginTop:'10px', display:'flex', gap:'15px', fontSize:'11px', color:'var(--muted)'}}>
          <span>{words} palabras</span><span>·</span>
          <span>{chars} caracteres</span><span>·</span>
          <span>{est} est.</span>
          {status === 'done' && blob && <span style={{color:'var(--green)'}}>· LISTO</span>}
        </div>

        <div style={{marginTop:'20px', display:'grid', gridTemplateColumns:'1fr 250px', gap:'20px'}}>
          <div style={{display:'flex', flexDirection:'column', gap:'12px'}}>
            <button className="btn btn-a" onClick={handleGenerate} disabled={status === 'loading' || status === 'synth'}>
              {(status === 'loading' || status === 'synth') && <ISpin/>}
              {status === 'loading' ? prog.label : status === 'synth' ? 'Sintetizando...' : 'Generar Voz con IA'}
            </button>
            
            {blob && (
              <button className="btn btn-g" onClick={() => {
                const a = document.createElement('a');
                a.href = audioUrlRef.current;
                a.download = 'textovox_ia.wav';
                a.click();
              }}>
                <IDown/> Descargar .WAV
              </button>
            )}
          </div>

          <div style={{background:'var(--surface2)', padding:'15px', borderRadius:'10px', display:'flex', flexDirection:'column', gap:'15px'}}>
            <div>
              <div style={{display:'flex', justifyContent:'space-between', marginBottom:'5px'}}>
                <span style={{fontSize:'10px', color:'var(--muted)'}}>VOLUMEN</span>
                <span className="badge">{Math.round(volume * 100)}%</span>
              </div>
              <input type="range" className="sld" min="0" max="1.5" step="0.1" value={volume} onChange={e=>setVolume(parseFloat(e.target.value))}/>
            </div>

            <div style={{fontSize:'11px', color:'var(--muted)', borderTop:'1px solid var(--border)', paddingTop:'10px'}}>
              <div style={{color:'var(--green)', marginBottom:'4px'}}>SPEECHT5 ENGINE</div>
              Modelo: Xenova/speecht5_tts<br/>
              Estado: <span style={{color:'var(--text)'}}>{status.toUpperCase()}</span>
            </div>
          </div>
        </div>
        {toast && <div className="toast">{toast}</div>}
      </div>
    );
  }

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
</script>
</body>
</html>
